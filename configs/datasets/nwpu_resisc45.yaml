dataset:
  name: nwpu_resisc45
  display_name: NWPU-RESISC45
  root: null
  output_split_root: splits/nwpu_resisc45
  class_folder_candidates:
    - NWPU-RESISC45
    - images
    - .
  class_name_mapping: {}
  expected_num_classes: 45
  min_images_per_class: 1
  ignore_hidden_files: true
  follow_symlinks: false
  image_extensions:
    - .jpg
    - .jpeg
    - .png
    - .tif
    - .tiff
  split:
    policy: class_stratified_random
    train_ratio: 0.6
    val_ratio: 0.2
    test_ratio: 0.2
